# vykar configuration file
# Minimal required configuration.
# Full reference: https://vykar.borgbase.com/configuration

# repositories:
#   - url: /path/to/repo

# sources:
#   - /path/to/source

# Windows paths: use single quotes or no quotes (double quotes break on backslashes)
#   - 'C:\Users\me\Documents'

# --- Common optional settings (uncomment as needed) ---

# encryption:
#   passphrase: "secret"
#
# retention:
#   keep_daily: 7
#   keep_weekly: 4
#
# compression:
#   algorithm: zstd
#   zstd_level: 3
#
# exclude_patterns:                  # Gitignore-style, relative to each source dir
#   - "*.tmp"
#   - ".cache/**"
#   - "/Downloads"                   # Leading / anchors to source root, not filesystem root
#   # NOTE: absolute paths like "/Users/jane/Movies/TV" do NOT work
#
# schedule:
#   enabled: true
#   every: "24h"

repositories:
  - label: ""
    url: ""
    access_token: ""

encryption:
  mode: "auto"
  passphrase: ""

sources:
  - "/home/ava/Pictures"
  - "/home/ava/Music"
  - "/home/ava/Downloads"
  - "/home/ava/Documents"
  - "/home/ava/Virtual Machines"

retention:
  keep_daily: 7
  keep_weekly: 4

compression:
  algorithm: zstd
  zstd_level: 9

exclude_patterns:
  - "*.tmp"
  - ".cache/**"

schedule:
  enabled: true
  every: "24h"
